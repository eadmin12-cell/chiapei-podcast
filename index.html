<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉北國小聲動校園 Podcast</title>
    
    <!-- 引入字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 載入 YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        /* =========================================
           1. 變數定義與基礎設定
           ========================================= */
        :root {
            var(--jiabei-blue): #4A90E2;      
            --jiabei-blue-light: #89C4F4;
            --growth-green: #2ECC71;     
            --sunlight-yellow: #F1C40F;  
            --warm-bg: #F9F7F1;          
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --gradient-primary: linear-gradient(135deg, #4A90E2, #2ECC71);
            --gradient-playing: linear-gradient(135deg, #FF6B6B, #EE5A24);
            --shadow-soft: 0 10px 30px rgba(74, 144, 226, 0.15);
            --shadow-hover: 0 20px 40px rgba(46, 204, 113, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; 
        }

        a, button, audio { cursor: pointer; }

        body {
            font-family: 'M PLUS Rounded 1c', 'Nunito', sans-serif;
            background-color: var(--warm-bg);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景與游標特效 */
        #cursor-follower { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }
        .sparkle {
            position: absolute; width: 15px; height: 15px; background-color: var(--sunlight-yellow);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle 1s ease-out forwards;
        }
        @keyframes twinkle {
            0% { transform: scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(90deg); opacity: 0; }
        }

        .bg-shapes { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; }
        .shape { position: absolute; filter: blur(80px); opacity: 0.5; animation: float 20s infinite ease-in-out alternate; }
        .shape-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--jiabei-blue-light); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        .shape-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: rgba(46, 204, 113, 0.3); border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; animation-delay: -5s; }
        
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(50px, 50px) rotate(20deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; }

        /* =========================================
           2. 英雄區塊與吉祥物特效
           ========================================= */
        header { text-align: center; margin-bottom: 60px; position: relative; padding-top: 40px; }
        .title-wrapper { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .mascot-img { width: 100px; height: auto; z-index: 20; animation: floating-mascot 3.5s ease-in-out infinite; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15)); }
        
        @keyframes floating-mascot {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        header h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800; color: var(--jiabei-blue); margin-bottom: 0; text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(74, 144, 226, 0.2); letter-spacing: 2px; position: relative; z-index: 10; }
        header p { font-size: 1.2rem; color: var(--text-light); max-width: 600px; margin: 0 auto; }

        /* =========================================
           3. Podcast 卡片列表
           ========================================= */
        #podcast-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 30px; }

        .podcast-card {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            border-radius: 24px; padding: 20px; box-shadow: var(--shadow-soft);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden; border: 2px solid transparent;
            display: flex; align-items: center; gap: 20px;
        }

        .podcast-card.is-playing {
            border-color: #FF6B6B;
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.2);
        }

        .podcast-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-hover); border-color: var(--growth-green); }
        .podcast-card.is-playing:hover { border-color: #FF6B6B; }

        .card-cover { flex-shrink: 0; width: 130px; height: 130px; border-radius: 16px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; z-index: 1; }
        .card-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .podcast-card:hover .card-cover img { transform: scale(1.08) rotate(2deg); }
        
        /* 播放中的轉盤動畫 */
        .podcast-card.is-playing .card-cover img {
            border-radius: 50%;
            animation: spinCover 10s linear infinite;
        }
        @keyframes spinCover { 100% { transform: rotate(360deg); } }

        .card-content { position: relative; z-index: 1; display: flex; flex-direction: column; flex-grow: 1; min-width: 0; height: 100%; justify-content: center; }
        .card-tag { align-self: flex-start; background: rgba(46, 204, 113, 0.1); color: var(--growth-green); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; }
        .podcast-card h3 { font-size: 1.25rem; color: var(--jiabei-blue); margin-bottom: 10px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        audio { width: 100%; height: 40px; margin-top: 5px; margin-bottom: 10px; outline: none; border-radius: 30px; }
        audio::-webkit-media-controls-enclosure { background-color: rgba(74, 144, 226, 0.08); }

        .meta-info { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--text-light); margin-top: auto; }
        .meta-info i { color: var(--sunlight-yellow); margin-right: 5px; }

        .loader { text-align: center; padding: 50px; font-size: 1.2rem; color: var(--jiabei-blue); font-weight: 700; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* =========================================
           4. 純音樂播放按鈕設計
           ========================================= */
        .play-btn {
            background: var(--gradient-primary);
            color: white; border: none; padding: 10px 24px; border-radius: 30px;
            font-size: 1rem; font-weight: bold; display: inline-flex; align-items: center; gap: 8px;
            margin: 10px 0; box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
            transition: all 0.3s ease;
        }

        .play-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(74, 144, 226, 0.5); }

        .play-btn.playing {
            background: var(--gradient-playing);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* 正在播放的聲波小動畫 */
        .equalizer {
            display: none; align-items: flex-end; gap: 3px; height: 15px; margin-left: 5px;
        }
        .play-btn.playing .equalizer { display: flex; }
        .play-btn.playing .fa-play-circle { display: none; }
        
        .bar { width: 3px; background: white; border-radius: 3px; animation: eq 1s infinite ease-in-out alternate; }
        .bar:nth-child(1) { height: 60%; animation-delay: 0.1s; }
        .bar:nth-child(2) { height: 100%; animation-delay: 0.3s; }
        .bar:nth-child(3) { height: 40%; animation-delay: 0.5s; }
        .bar:nth-child(4) { height: 80%; animation-delay: 0.2s; }
        @keyframes eq { 0% { height: 20%; } 100% { height: 100%; } }

        @media (max-width: 768px) {
            .title-wrapper { gap: 10px; }
            .mascot-img { width: 70px; }
            header h1 { font-size: 2.2rem; }
            * { cursor: auto !important; } 
            #cursor-follower { display: none; }
            .podcast-card { flex-direction: column; text-align: center; gap: 15px; }
            .card-cover { width: 180px; height: 180px; border-radius: 50%; }
            .card-tag { align-self: center; }
            .meta-info { justify-content: center; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div id="cursor-follower"></div>

    <div class="container">
        <header>
            <div class="title-wrapper">
                <img src="01.png" alt="嘉北吉祥物" class="mascot-img" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=jiabei&backgroundColor=F1C40F&radius=50'; this.onerror=null;">
                <h1>嘉北國小聲動校園</h1>
            </div>
            <p>歡迎來到嘉北國小的聲音遊樂園！我們用雙語分享故事，一起快樂學習。</p>
        </header>

        <div id="loader" class="loader">
            <i class="fas fa-spinner fa-spin"></i> 正在從 Google Sheets 召喚最新節目...
        </div>

        <div id="podcast-list"></div>
    </div>

    <!-- 隱藏的 YouTube 播放器容器 -->
    <div id="yt-player-container" style="display: none;"></div>

    <script>
        /* =========================================
           1. 星星滑鼠跟隨特效
           ========================================= */
        const follower = document.getElementById('cursor-follower');
        let lastSparkleTime = 0;

        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                const now = Date.now();
                if (now - lastSparkleTime > 50) {
                    createSparkle(e.clientX, e.clientY);
                    lastSparkleTime = now;
                }
            });
        }

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            const offsetX = (Math.random() - 0.5) * 20;
            const offsetY = (Math.random() - 0.5) * 20;
            sparkle.style.left = `${x + offsetX}px`;
            sparkle.style.top = `${y + offsetY}px`;
            follower.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 1000);
        }

        /* =========================================
           2. YouTube 隱藏音樂播放器邏輯 (核心修改)
           ========================================= */
        let ytPlayer;
        let currentPlayingId = null;

        // 當 YouTube API 準備好時自動呼叫此函數
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player-container', {
                height: '0', // 隱藏播放器
                width: '0',
                videoId: '', 
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'playsinline': 1 // 避免 iOS 全螢幕播放
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 監聽 YouTube 播放狀態改變
        function onPlayerStateChange(event) {
            // event.data: 1 是播放中, 2 是暫停, 0 是結束
            if (event.data == YT.PlayerState.PLAYING) {
                updateUIState(currentPlayingId, true);
                pauseAllNativeAudios(); // 暫停其他傳統 MP3
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                updateUIState(currentPlayingId, false);
            }
        }

        // 切換播放與暫停
        function toggleYouTubeAudio(videoId) {
            if (!ytPlayer || !ytPlayer.loadVideoById) {
                alert("播放器還在準備中，請稍等一秒再試！");
                return;
            }

            if (currentPlayingId === videoId) {
                // 如果點擊的是同一首歌，則切換播放/暫停
                const state = ytPlayer.getPlayerState();
                if (state === YT.PlayerState.PLAYING) {
                    ytPlayer.pauseVideo();
                } else {
                    ytPlayer.playVideo();
                }
            } else {
                // 點擊了不同的歌，重新載入並播放
                resetAllUI();
                currentPlayingId = videoId;
                ytPlayer.loadVideoById(videoId);
            }
        }

        // 暫停網頁上所有的 <audio> 標籤 (避免跟YT同時出聲)
        function pauseAllNativeAudios() {
            document.querySelectorAll('audio').forEach(audio => audio.pause());
        }

        // 當傳統 <audio> 播放時，暫停 YouTube
        document.addEventListener('play', function(e){
            if(e.target.tagName === 'AUDIO' && ytPlayer && typeof ytPlayer.pauseVideo === 'function'){
                ytPlayer.pauseVideo();
            }
        }, true);


        // 更新按鈕與卡片的 UI 狀態
        function updateUIState(videoId, isPlaying) {
            const btn = document.getElementById(`btn-${videoId}`);
            const card = document.getElementById(`card-${videoId}`);
            if (!btn || !card) return;

            if (isPlaying) {
                btn.classList.add('playing');
                btn.innerHTML = `<i class="fas fa-pause-circle"></i> 暫停收聽
                                 <div class="equalizer">
                                     <div class="bar"></div><div class="bar"></div>
                                     <div class="bar"></div><div class="bar"></div>
                                 </div>`;
                card.classList.add('is-playing');
            } else {
                btn.classList.remove('playing');
                btn.innerHTML = `<i class="fas fa-play-circle"></i> 播放本集`;
                card.classList.remove('is-playing');
            }
        }

        // 重置所有 UI 為未播放狀態
        function resetAllUI() {
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.classList.remove('playing');
                btn.innerHTML = `<i class="fas fa-play-circle"></i> 播放本集`;
            });
            document.querySelectorAll('.podcast-card').forEach(card => {
                card.classList.remove('is-playing');
            });
        }

        /* =========================================
           3. Google Sheets 資料讀取邏輯
           ========================================= */
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTR23rvquoEYgIo4nCvGOFD04PH1IzHnKvhkRevckGS6dLcv2elws56WvGHmiUCHE0GYRWpCUrgzyg-/pub?output=csv';

        function init() { loadFromGoogleSheets(); }

        function loadFromGoogleSheets() {
            Papa.parse(SHEET_CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    renderEpisodes(results.data);
                    document.getElementById('loader').style.display = 'none';
                },
                error: function() { document.getElementById('loader').innerHTML = '❌ 資料讀取失敗。'; }
            });
        }

        /* =========================================
           4. 渲染 Podcast 卡片
           ========================================= */
        function renderEpisodes(data) {
            const list = document.getElementById('podcast-list');
            const validData = data.filter(item => item.title);

            if(validData.length === 0) {
                list.innerHTML = '<div style="text-align:center; width:100%; color:gray;">目前還沒有 Podcast 節目喔！</div>';
                return;
            }

            list.innerHTML = validData.map((ep, index) => {
                const categoryTag = ep.category || '精選節目';
                const ytUrlToCheck = ep.yt_url || ep.audio_url; 
                const videoId = extractYoutubeId(ytUrlToCheck);
                
                const ytCover = videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : '';
                const defaultCover = 'https://picsum.photos/seed/jiabei/300/300';
                const finalCover = ep.cover_url || ytCover || defaultCover;
                const animationDelay = `style="animation: fadeInUp 0.5s ease-out ${index * 0.1}s both;"`;

                // 產生播放器區塊
                let playerHTML = '';
                if (videoId) {
                    // 使用新的隱藏音訊切換按鈕
                    playerHTML = `<button id="btn-${videoId}" class="play-btn" onclick="toggleYouTubeAudio('${videoId}')">
                                    <i class="fas fa-play-circle"></i> 播放本集
                                  </button>`;
                } else if (ep.audio_url) {
                    // 如果老師真的傳了 mp3 網址，保留原生 audio 播放器
                    playerHTML = `<audio controls preload="none"><source src="${ep.audio_url}" type="audio/mpeg">您的瀏覽器不支援聲音播放。</audio>`;
                } else {
                    playerHTML = `<p style="font-size:0.85rem; color:red; margin:10px 0;">(尚無音檔連結)</p>`;
                }

                return `
                    <div id="card-${videoId}" class="podcast-card" ${animationDelay}>
                        <div class="card-cover">
                            <img src="${finalCover}" alt="Podcast Cover">
                        </div>
                        <div class="card-content">
                            <span class="card-tag">${categoryTag}</span>
                            <h3>${ep.title}</h3>
                            ${playerHTML}
                            <div class="meta-info">
                                <span><i class="far fa-calendar-alt"></i> ${ep.date || '未知日期'}</span>
                                <span>嘉北國小</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function extractYoutubeId(url) {
            if(!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.onload = init;
    </script>
</body>
</html>
